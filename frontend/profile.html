<!-- Profile Page Content -->
<div class="page-header">
    <h1>Student Profile</h1>
    <p>Manage your personal information</p>
</div>

<div class="card">
    <div class="card-header">
        <h2>Personal Information</h2>
        <p>Update your profile details</p>
    </div>

    <div id="profileMessage"></div>

    <form id="profileForm" class="profile-form">
        <div class="form-group">
            <label for="profileName">Full Name</label>
            <input type="text" id="profileName" class="form-input" readonly
                style="background: rgba(255, 255, 255, 0.02); cursor: not-allowed;">
        </div>

        <div class="form-group">
            <label for="profileEmail">Email</label>
            <input type="email" id="profileEmail" class="form-input" readonly
                style="background: rgba(255, 255, 255, 0.02); cursor: not-allowed;">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" class="form-input" placeholder="Enter your age" min="15" max="100">
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" class="form-input">
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="course">Course / Department</label>
            <input type="text" id="course" class="form-input" placeholder="e.g., Computer Science Engineering">
        </div>

        <div class="form-group">
            <label for="semester">Semester</label>
            <select id="semester" class="form-input">
                <option value="">Select semester</option>
                <option value="1st Semester">1st Semester</option>
                <option value="2nd Semester">2nd Semester</option>
                <option value="3rd Semester">3rd Semester</option>
                <option value="4th Semester">4th Semester</option>
                <option value="5th Semester">5th Semester</option>
                <option value="6th Semester">6th Semester</option>
                <option value="7th Semester">7th Semester</option>
                <option value="8th Semester">8th Semester</option>
            </select>
        </div>

        <div class="form-group">
            <label for="college">College Name</label>
            <input type="text" id="college" class="form-input" placeholder="Enter your college name">
        </div>

        <button type="submit" class="btn btn-primary" id="saveProfileBtn">
            <span id="saveProfileText">Save Profile</span>
            <span id="saveProfileLoading" class="loading hidden"></span>
        </button>
    </form>
</div>
