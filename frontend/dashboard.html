<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Student Performance Analyzer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Shared configuration - must load first -->
    <script src="js/config.js"></script>
    <!-- Preload all page scripts -->
    <script src="js/home.js" defer></script>
    <script src="js/profile.js" defer></script>
    <script src="js/analyzer.js" defer></script>
    <script src="js/chat.js" defer></script>
</head>

<body>
    <div class="dashboard">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="navbar-content">
                <div class="navbar-brand">Student Performance Analyzer</div>

                <div class="navbar-tabs">
                    <button class="nav-tab active" data-page="home">Home</button>
                    <button class="nav-tab" data-page="profile">Profile</button>
                    <button class="nav-tab" data-page="analyzer">Performance Analyzer</button>
                    <button class="nav-tab" data-page="chat">AI Assistant</button>
                </div>

                <div class="navbar-profile">
                    <div class="profile-button" id="profileBtn">
                        <span id="profileInitial">S</span>
                    </div>
                    <div class="profile-dropdown" id="profileDropdown">
                        <div class="profile-dropdown-item" id="logoutBtn">
                            Logout
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Dashboard Content -->
        <div class="dashboard-content">
            <div id="pageContent">
                <!-- Content will be loaded here dynamically -->
            </div>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>

</html>
