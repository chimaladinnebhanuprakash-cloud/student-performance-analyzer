<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Student Performance Analyzer</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join Student Performance Analyzer</p>
            </div>

            <div id="errorContainer"></div>
            <div id="successContainer"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" class="form-input" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="e.g. Pass123"
                        pattern="^[A-Z][a-zA-Z0-9]{5,}$"
                        title="Must be at least 6 characters, start with a capital letter, and contain only letters and numbers."
                        required>
                    <small class="form-hint">Must start with a capital letter, min 6 chars, alphanumeric only.</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter your password"
                        required>
                </div>

                <button type="submit" class="btn btn-primary" id="signupBtn">
                    <span id="signupBtnText">Create Account</span>
                    <span id="signupBtnLoading" class="loading hidden"></span>
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="index.html">Login here</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
